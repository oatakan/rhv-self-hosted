---

- name: enable ovirt master snapshot copr for rhel 9
  ansible.builtin.command: dnf copr enable -y ovirt/ovirt-master-snapshot rhel-9-x86_64

- name: install ovirt master release and epel
  ansible.builtin.package:
    name:
      - ovirt-release-master
    state: present

- name: enable ovirt repositories (4.5)
  package:
    name: centos-release-ovirt45
    state: latest
  when: ovirt_engine_setup_version is version('4.5', '>=')
