- hosts: all
  become: yes
  vars:
    pci_device_key_name: NVIDIA
  tasks:
    - name: detach gpu
      debug:
        msg: "{{ item }}"
      loop: "{{ range(0, 2, 1)|list }}"

    - name: get pci slot
      shell: lspci -mm | grep "{{ pci_device_key_name }}" | cut -d " " -f 1
      register: pci_slot

    - name: find vendor_device
      shell: lspci -kn -s "{{ item }}" | head -1 | cut -d" " -f 3 | tr -d '[:space:]'
      register: pci_vendor_device
      with_items: "{{ pci_slot.stdout_lines }}"

    - name: find module
      shell: lspci -vkmmn -s "{{ item }}" | grep "^Module:" | cut -d":" -f 2 | tr -d '[:space:]'
      register: pci_module
      with_items: "{{ pci_slot.stdout_lines }}"

    - name: debug pci-stub.ids to grub
      debug:
        msg: '{{ pci_vendor_device.results|map(attribute="stdout")|reject("equalto", "")|join (",") }}'
      when: pci_vendor_device is defined

    - name: debug rdblacklist to grub
      debug:
        msg: '{{ pci_module.results|map(attribute="stdout")|reject("equalto", "")|join (",") }}'
      when: pci_module is defined

    - name: debug improved rdblacklist to grub
      debug:
        msg: '{{ pci_module.results|map(attribute="stdout")|reject("equalto", "")|join (",") }}'
      when: pci_module is defined

    - name: add iommu=pt to grub
      lineinfile:
        state: present
        dest: /tmp/grub-test
        backrefs: yes
        regexp: '^(GRUB_CMDLINE_LINUX=(?!.*\ iommu)\"[^\"]+)(\".*)'
        line: '\1 iommu=pt\2'

    - name: add amd_iommu to grub
      lineinfile:
        state: present
        dest: /tmp/grub-test
        backrefs: yes
        regexp: '^(GRUB_CMDLINE_LINUX=(?!.*amd_iommu)\"[^\"]+)(\".*)'
        line: '\1 amd_iommu=on\2'
      when: ('AMD' in ansible_processor[1])